services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: qm-documents-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qm-documents
    ports:
      - "5432:5432"
    volumes:
      - qm_documents_pg:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: qm-management-backend
    working_dir: /app/backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/qm-documents
      OPENAI_CHAT_MODEL: gpt-4o-mini
      OPENAI_REWRITE_MODEL: gpt-4o-mini
      OPENAI_ROUTER_MODEL: gpt-4o-mini
      OPENAI_EMBED_MODEL: text-embedding-3-small
      DATA_ROOT: /data
    env_file:
      - .env.local
    depends_on:
      - postgres
    volumes:
      - .:/app
      - qm_documents_data:/data
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8001"
    ports:
      - "8001:8001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: qm-management-frontend
    working_dir: /app
    environment:
      BACKEND_URL: http://backend:8001
      NODE_ENV: development
    depends_on:
      - backend
    volumes:
      - .:/app
      - qm_frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"

volumes:
  qm_documents_pg:
    external: true
    name: qm-management-v2_qm_rag_pg
  qm_documents_data:
  qm_frontend_node_modules:
