openapi: 3.0.3
info:
  title: QM Documents Backend API
  version: 1.0.0
  description: |
    Document template backend for handbook-scoped uploads, placeholder extraction, rendering, and AI rewrite.

    ## Authentication
    **No authentication required.** All endpoints are open.

    ## Scope
    All documents are scoped by `handbook_id`.
paths:
  /api/v1/clients/:
    get:
      operationId: v1_clients_list
      description: CRUD endpoints for consulting clients.
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'
          description: ''
    post:
      operationId: v1_clients_create
      description: CRUD endpoints for consulting clients.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClientRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClientRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
          description: ''
  /api/v1/clients/{id}/:
    get:
      operationId: v1_clients_retrieve
      description: CRUD endpoints for consulting clients.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this client.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
          description: ''
    put:
      operationId: v1_clients_update
      description: CRUD endpoints for consulting clients.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this client.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClientRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClientRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
          description: ''
    patch:
      operationId: v1_clients_partial_update
      description: CRUD endpoints for consulting clients.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this client.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedClientRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedClientRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedClientRequest'
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
          description: ''
    delete:
      operationId: v1_clients_destroy
      description: CRUD endpoints for consulting clients.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this client.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/v1/documents:
    get:
      operationId: v1_documents_retrieve
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/documents/{document_id}:
    get:
      operationId: v1_documents_retrieve_2
      parameters:
      - in: path
        name: document_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
    delete:
      operationId: v1_documents_destroy
      parameters:
      - in: path
        name: document_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/v1/documents/{document_id}/ai-rewrite:
    post:
      operationId: v1_documents_ai_rewrite_create
      parameters:
      - in: path
        name: document_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/documents/{document_id}/download:
    get:
      operationId: v1_documents_download_retrieve
      parameters:
      - in: path
        name: document_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/documents/{document_id}/render:
    post:
      operationId: v1_documents_render_create
      parameters:
      - in: path
        name: document_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/documents/upload:
    post:
      operationId: v1_documents_upload_create
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/files:
    delete:
      operationId: v1_files_destroy
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/v1/files/tree:
    get:
      operationId: v1_files_tree_retrieve
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/handbooks/{handbook_id}/assets:
    get:
      operationId: v1_handbooks_assets_retrieve
      parameters:
      - in: path
        name: handbook_id
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_handbooks_assets_create
      parameters:
      - in: path
        name: handbook_id
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
components:
  schemas:
    Client:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        address:
          type: string
        zipCity:
          type: string
        ceo:
          type: string
          maxLength: 255
        qmManager:
          type: string
        employeeCount:
          type: integer
        products:
          type: string
        services:
          type: string
        industry:
          type: string
          maxLength: 255
        logoUrl:
          type: string
          nullable: true
        signatureUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
      required:
      - address
      - ceo
      - createdAt
      - employeeCount
      - id
      - industry
      - name
      - products
      - qmManager
      - services
      - updatedAt
      - zipCity
    ClientRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        address:
          type: string
          minLength: 1
        zipCity:
          type: string
          minLength: 1
        ceo:
          type: string
          minLength: 1
          maxLength: 255
        qmManager:
          type: string
          minLength: 1
        employeeCount:
          type: integer
        products:
          type: string
          minLength: 1
        services:
          type: string
          minLength: 1
        industry:
          type: string
          minLength: 1
          maxLength: 255
        logoUrl:
          type: string
          nullable: true
          minLength: 1
        signatureUrl:
          type: string
          nullable: true
          minLength: 1
      required:
      - address
      - ceo
      - employeeCount
      - industry
      - name
      - products
      - qmManager
      - services
      - zipCity
    PatchedClientRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        address:
          type: string
          minLength: 1
        zipCity:
          type: string
          minLength: 1
        ceo:
          type: string
          minLength: 1
          maxLength: 255
        qmManager:
          type: string
          minLength: 1
        employeeCount:
          type: integer
        products:
          type: string
          minLength: 1
        services:
          type: string
          minLength: 1
        industry:
          type: string
          minLength: 1
          maxLength: 255
        logoUrl:
          type: string
          nullable: true
          minLength: 1
        signatureUrl:
          type: string
          nullable: true
          minLength: 1
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
tags:
- name: Health
  description: Server health check
- name: Documents
  description: Document upload, render, rewrite, tree, and download
